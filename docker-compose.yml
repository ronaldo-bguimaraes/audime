name: audime
services:
  postgres:
    image: postgres:18
    container_name: audime-postgres
    restart: unless-stopped
    ports:
      - "${DB_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER} -d ${DB_POSTGRES_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: audime-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DB_POSTGRES_USER: ${DB_POSTGRES_USER}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      DB_POSTGRES_HOST: postgres
      DB_POSTGRES_NAME: ${DB_POSTGRES_NAME}
      DB_POSTGRES_PORT: "5432"
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_STORAGE_BUCKET: ${R2_STORAGE_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
    container_name: audime-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - backend

  cloudflared:
    container_name: audime-cloudflared
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  postgres_data:
